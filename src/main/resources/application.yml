spring:
  datasource:
    url: jdbc:mysql://localhost:3306/astramaco_db?useSSL=false&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  address: 0.0.0.0

app:
  admin:
    username: admin
    password: ${ADMIN_PASSWORD}